<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#833ab4"/>
      <stop offset="0.55" stop-color="#e1306c"/>
      <stop offset="1" stop-color="#fd1d1d"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded-square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Spokes from center to each platform node -->
  <g stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.85">
    <line x1="256" y1="256" x2="140" y2="150"/>
    <line x1="256" y1="256" x2="372" y2="150"/>
    <line x1="256" y1="256" x2="256" y2="402"/>
  </g>

  <!-- Central hub -->
  <circle cx="256" cy="256" r="46" fill="#ffffff" filter="url(#glow)"/>

  <!-- Platform nodes (Instagram pink, Facebook blue, TikTok cyan) -->
  <circle cx="140" cy="150" r="34" fill="#e1306c" stroke="#ffffff" stroke-width="8"/>
  <circle cx="372" cy="150" r="34" fill="#1877f2" stroke="#ffffff" stroke-width="8"/>
  <circle cx="256" cy="402" r="34" fill="#00f2ea" stroke="#ffffff" stroke-width="8"/>
</svg>
